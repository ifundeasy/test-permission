services:
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-app}
      POSTGRES_DB: ${DB_NAME:-authz}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app} -d ${DB_NAME:-authz}"]
      interval: 3s
      timeout: 3s
      retries: 10

  authz-service:
    build: .                          # build the authz-service image from the repo root Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env                          # single source of truth for DB_USER/DB_PASSWORD/DB_NAME/PORT
    environment:
      # inside the compose network the DB is reached by the service name, not localhost
      DB_HOST: postgres
    ports:
      - "${PORT:-8080}:8080"
